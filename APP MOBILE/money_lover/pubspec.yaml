name: money_lover
description: "SmartMoney Mobile App - Group03"
publish_to: 'none'
version: 1.0.0+1

# ==========================================
# 1. CẤU HÌNH MÔI TRƯỜNG
# ==========================================
environment:
  sdk: '>=3.10.7 <4.0.0'
  # Khóa cứng Flutter SDK đúng bản 3.38.7
  flutter: '3.38.7'

# ==========================================
# 2. DEPENDENCIES CHÍNH
# ==========================================
dependencies:
  flutter:
    sdk: flutter

  # --- UI & UTILITIES ---
  cupertino_icons: ^1.0.8
  # Vẽ biểu đồ (dùng trong màn hình Báo cáo/Thống kê)
  fl_chart: ^0.66.2
  # Xử lý format ngày tháng, tiền tệ (dùng trong core/helpers/format_helper.dart)
  intl: ^0.20.2
  # Hiển thị thông báo nhanh (toast)
  fluttertoast: ^8.2.4

  # --- STATE MANAGEMENT & ARCHITECTURE ---
  # Quản lý State (khớp với thư mục providers/ trong mỗi module)
  provider: ^6.1.1
  # Service Locator: Giúp quản lý và truy cập các Service (AuthService, WalletService...)
  # Rất quan trọng cho kiến trúc module của bạn.
  get_it: ^7.6.7
  # So sánh object, giúp Provider nhận biết khi nào cần rebuild UI
  equatable: ^2.0.5

  # --- NETWORKING (API) ---
  # Client HTTP cơ bản, được quản lý qua core/helpers/api_handler.dart
  http: ^1.2.0

  # --- LOCAL STORAGE ---
  # Lưu các dữ liệu bí mật: JWT token, refresh token... (khớp với token_helper.dart)
  flutter_secure_storage: ^9.0.0
  # Lưu các cài đặt đơn giản: theme (dark/light), ngôn ngữ...
  shared_preferences: ^2.2.2

  # --- AUTHENTICATION & NOTIFICATION ---
  # Giải mã JWT token ở phía client (nếu cần)
  jwt_decoder: ^2.0.1
  # Lấy thông tin thiết bị (type, name) để gửi lên server
  device_info_plus: ^10.1.0
  # --- Firebase ---
  # Bắt buộc: Khởi tạo Firebase SDK trong app
  firebase_core: ^3.6.0
  # Lấy FCM device token và nhận push notification (khớp với notification_service.dart)
  firebase_messaging: ^15.1.3

  # --- NAVIGATION ---
  # Hệ thống điều hướng mạnh mẽ, khớp với vai trò của core/routing/app_router.dart
  go_router: ^14.0.2

# ==========================================
# 3. CÁC GÓI ĐÃ QUYẾT ĐỊNH KHÔNG SỬ DỤNG
# ==========================================
#  # Hiển thị ảnh SVG từ network (BẮT BUỘC để hiển thị icon_url nếu là file svg từ DB)
#  # Đã quyết định không dùng SVG để giữ sự đơn giản, chỉ dùng PNG.
#  flutter_svg: ^2.0.10+1
#
#  # Client HTTP mạnh mẽ, hỗ trợ Interceptor để tự động gắn JWT token
#  # Đã quyết định KHÔNG SỬ DỤNG để giữ sự đơn giản cho team.
#  dio: ^5.4.3+1

# ==========================================
# 4. DEV DEPENDENCIES
# ==========================================
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# ==========================================
# 5. FLUTTER CONFIG
# ==========================================
flutter:
  uses-material-design: true

  # assets:
  #   - assets/images/
