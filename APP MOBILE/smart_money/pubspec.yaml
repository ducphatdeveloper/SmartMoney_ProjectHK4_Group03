name: smart_money #TÊN PACKAGE LÀ GÌ TẠI ĐÂY PHẢI ĐỂ NHƯ VẬY
description: "SmartMoney Mobile App - Group03"
publish_to: 'none'

version: 1.0.0+1

# ==========================================
# 1. CẤU HÌNH MÔI TRƯỜNG
# ==========================================
environment:
  sdk: '>=3.10.7 <4.0.0'
  flutter: '3.38.7'

# ==========================================
# 2. DEPENDENCIES CHÍNH
# ==========================================
dependencies:
  flutter:
    sdk: flutter
  
  # ✅ [FIX] Thêm flutter_localizations để DatePicker có MaterialLocalizations
  flutter_localizations:
    sdk: flutter

  # --- UI & UTILITIES ---
  cupertino_icons: ^1.0.8
  # Vẽ biểu đồ tròn, cột, đường trong màn hình Báo cáo/Thống kê
  fl_chart: ^0.66.2
  animations: ^2.0.11
  # ✅ [RESTORE] Giữ nguyên theo Flutter SDK để không bị lỗi ghim phiên bản
  intl: ^0.20.2
  # Hiện popup nhỏ phản hồi thao tác: "Tạo ví thành công", "Xóa thất bại"...
  fluttertoast: ^8.2.4

  # --- IMAGE LOADING & CACHE ---
  # Load ảnh từ URL Cloudinary và tự lưu vào bộ nhớ thiết bị.
  # Lần đầu: tải từ internet. Lần sau: đọc từ máy, không tốn băng thông.
  # Cache giữ mãi đến khi user xóa cache app trong Cài đặt điện thoại.
  # Dùng cho: avatar người dùng, icon ví, icon danh mục, icon sự kiện.  
  cached_network_image: ^3.3.1

  image_picker: ^1.1.2
  # --- STATE MANAGEMENT & ARCHITECTURE ---
  # Quản lý state toàn app, khớp với thư mục providers/ trong mỗi module
  provider: ^6.1.2
  # Quản lý và inject các Service (WalletService, AuthService...) vào Provider
  get_it: ^7.6.7
  # So sánh 2 object có giống nhau không, giúp Provider biết khi nào rebuild UI
  equatable: ^2.0.5

  # --- NETWORKING (API) ---
  # Gọi HTTP lên Spring Boot Server, được bọc trong api_handler.dart
  http: ^1.2.0

  # --- LOCAL STORAGE ---
  # Lưu JWT token an toàn trong vùng bộ nhớ được mã hóa của thiết bị
  flutter_secure_storage: ^9.0.0
  # Lưu cài đặt đơn giản: chế độ sáng/tối, ngôn ngữ, lần đầu mở app
  shared_preferences: ^2.2.2

  # --- BIOMETRIC AUTHENTICATION ---
  # ✅ [UPGRADE] Sử dụng phiên bản mới nhất để tương thích intl 0.20.2
  local_auth: ^2.3.0

  # --- VOICE RECOGNITION ---
  # Chuyển giọng nói thành văn bản cho AI Chat
  speech_to_text: ^7.0.0

  # --- IMAGE PICKER ---
  # Chọn ảnh từ gallery để upload hóa đơn OCR
  #image_picker: đã có

  # --- AUTHENTICATION & NOTIFICATION ---
  # Giải mã JWT token để đọc thông tin role/userId mà không cần gọi API
  jwt_decoder: ^2.0.1
  # Lấy thông tin thiết bị (tên máy, hệ điều hành) để gửi kèm khi đăng nhập
  device_info_plus: ^10.1.0
  # ✅ [ADD] Xin quyền thông báo và các quyền khác của hệ thống
  permission_handler: ^11.3.1

  # --- Firebase ---
  # Bắt buộc phải có: khởi tạo Firebase trước khi dùng bất kỳ dịch vụ Firebase nào
  firebase_core: ^3.6.0
  # Firebase Authentication
  firebase_auth: ^5.3.1
  # Google Sign In
  google_sign_in: ^6.2.1
  
  # Nhận push notification khi app đang ĐÓNG hoặc chạy nền (vuốt từ trên xuống)
  firebase_messaging: ^15.1.3
  # Hiện thông báo vuốt từ trên xuống khi app đang MỞ
  # Firebase không tự hiện UI khi app foreground, package này bù phần đó  
  flutter_local_notifications: ^17.0.0
  # Kiểm tra có Wifi/4G không trước khi gọi API
  # Mất mạng → báo ngay "Không có kết nối" thay vì chờ 30 giây rồi crash
  connectivity_plus: ^6.0.3

  # --- NAVIGATION ---
  # Điều hướng giữa các màn hình, khớp với core/routing/app_router.dart
  go_router: ^14.0.2

  # --- URL LAUNCHER ---
  # Mở URL, gọi điện, gửi email, SMS từ app
  url_launcher: ^6.2.3

# ==========================================
# 3. DEV DEPENDENCIES
# ==========================================
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

# ==========================================
# 4. APP ICON CONFIG
# ==========================================
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
# ==========================================
# 5. FLUTTER CONFIG
# ==========================================
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
