# =============================================================================
# SPRING AI OLLAMA CONFIGURATION (Chay cuc bo ko can API key)
# =============================================================================

# URL may chu Ollama cha y local port 11434 (ma c din h cua Ollama)
# Neu team dung LAN server: doi than h http://192.168.x.x:11434
# URL Google Colab + ngrok (server manh, model 7B)
spring.ai.ollama.base-url=https://postwar-twisty-chemist.ngrok-free.dev
#spring.ai.ollama.base-url=http://localhost:11434

#Timeout chi ap dung cho chat model k hong ap dung cho RestTemplate tron g analyzeReceiptImage. tron g OllamaService.java
spring.ai.ollama.chat.options.timeout=300s

# Model chat chin h xu ly intent, bao cao, tu van tai chin h

# Model chat chin h xu ly intent, bao cao, tu van tai chin h
# qwen:4b: ~4GB RAM, tien g Viet tot, parse so tien VND chin h xac
#spring.ai.ollama.chat.model=qwen3:1.7b - qwen3:1.7b sai tam
# Model chat chin h (Google Colab - qwen2.5:7B sie u xin)
spring.ai.ollama.chat.model=qwen2.5:7b
# Model cuc bo (test local)
#spring.ai.ollama.chat.model=llama3.2:3b
#spring.ai.ollama.chat.model=llama3.2:1b - fastest llama3.1:8b
#spring.ai.ollama.chat.model=llama3.1:8b
#spring.ai.ollama.chat.model=llama3.2:1b

# Temperature = 0.2 QUAN TRONG cho app tai chin h
# low = AI it "sang tao", so tien chin h xac, JSON output on din h
# Dai: 0.0 (may moc) > 1.0 (sang tao). Tai chin h dung 0.1-0.4
spring.ai.ollama.chat.options.temperature=0.3

# So token toi da AI sinh ra moi lan pha n hoi
# 100 du cho JSON intent + cau tra loi nga n de tang toc test
spring.ai.ollama.chat.options.num-predict=1500

# Context window cua model (qua n tron g!): system prompt ~5200 tokens
# Default Ollama = 4096 -> bi cat bot prompt gay AI "ngao" ngu can h - doi voi gpu co the 16000 32000
# Tang len 8192 de chu a du system prompt + history + response
spring.ai.ollama.chat.options.num-ctx=8192

# Model OCR Vision pha n tich anh hoa don
# Dung rie ng tron g ReceiptServiceImpl (goi truc tie p OllamaApi, ko dung ChatModel)
spring.ai.ollama.vision.model=qwen3-vl:4b

# Cho phe p pull model tu dong neu chua co (false = an toan hon, tu qua n)
spring.ai.ollama.init.pull-model-strategy=never