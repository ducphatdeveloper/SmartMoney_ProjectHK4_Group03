# =============================================================================
# SPRING AI OLLAMA CONFIGURATION (Chay cuc bo ko can API key)
# =============================================================================

# URL may chu Ollama cha y local port 11434 (ma c din h cua Ollama)
# Neu team dung LAN server: doi thanh http://192.168.x.x:11434
spring.ai.ollama.base-url=http://localhost:11434

# Model chat chin h xu ly intent, bao cao, tu van tai chin h
# qwen3.5:4b: ~3-4GB RAM, tien g Viet tot, parse so tien VNd chin h xac
spring.ai.ollama.chat.model=qwen3.5:4b

# Temperature = 0.3 QUAN TRON G cho app tai chin h
# low = AI it "sang tao", so tien chin h xac, JSON output on din h
# Dai: 0.0 (may moc) > 1.0 (sang tao). Tai chin h dung 0.1-0.4
spring.ai.ollama.chat.options.temperature=0.3

# So token toi da AI sinh ra moi lan phan hoi
# 512 du cho JSON intent + cau tra loi ngan, tang neu can bao cao dai
spring.ai.ollama.chat.options.num-predict=512

# Model OCR Vision pha n tich anh hoa don
# Dung rie ng tron g ReceiptServiceImpl (goi truc tie p OllamaApi, ko dung ChatModel)
spring.ai.ollama.vision.model=qwen3-vl:4b

# Timeout khi goi Ollama (g iay) model 4B trên CPU can 10-30s
# Tang neu server yeu h oac anh hoa don phu c tap
spring.ai.ollama.chat.options.timeout=60

# Cho ph ep pull model tu dong neu chu a co (false = an toan hon, tu qu an)
spring.ai.ollama.init.pull-model-strategy=never