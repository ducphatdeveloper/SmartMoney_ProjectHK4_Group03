# =============================================================================
# WEBCLIENT CONFIGURATION (cho GeminiService)
# =============================================================================
spring.codec.max-in-memory-size=10MB

# =============================================================================
# RESILIENCE4J CONFIGURATION Retry Logic cho Gemini API (xu ly rate limit 429)
# =============================================================================
# 1. Enable management endpoints
management.endpoints.web.exposure.include=retry
management.endpoint.health.show-details=always

# 2. Cau hinh Retry Gemini API (Tang thoi gian cho va retry de tranh loi hien tai)
resilience4j.retry.instances.gemini-chat.max-attempts=3
resilience4j.retry.instances.gemini-chat.wait-duration=8000ms
# Chi retry khi gap loi 429 Too Many Requests hoac Timeout
resilience4j.retry.instances.gemini-chat.retry-exceptions=org.springframework.web.reactive.function.client.WebClientResponseException$TooManyRequests,java.util.concurrent.TimeoutException,org.springframework.web.reactive.function.client.WebClientRequestException
# Exponential backoff: lan 1 cho 8s, lan 2 cho 16s
resilience4j.retry.instances.gemini-chat.enable-exponential-backoff=true
resilience4j.retry.instances.gemini-chat.exponential-backoff-multiplier=2
resilience4j.retry.instances.gemini-chat.randomized-wait-factor=0.5

